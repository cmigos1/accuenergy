; AccuEnergy — ESP32 UART bridge
; STM32H743 (LPUART1 @ 460800) → UART2 (RX=16, TX=17) → USB Serial → PC

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 460800
upload_speed  = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
